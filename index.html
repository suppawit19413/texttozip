<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>HTML + CSS + JS ZIP Generator</title>
<style>
  body { font-family: Arial; margin: 40px; max-width: 700px; }
  textarea { width: 100%; height: 250px; margin-bottom: 20px; font-family: monospace; }
  button { padding: 10px 20px; cursor: pointer; }
  h2 { margin-bottom: 10px; }
</style>
</head>
<body>
<h2>สร้างไฟล์ ZIP สำหรับ Cloudflare Pages</h2>
<p>วาง HTML/CSS/JS ของคุณลงในกล่องด้านล่าง (รวม &lt;style&gt; และ &lt;script&gt; ได้) จากนั้นกด “สร้าง ZIP”</p>

<textarea id="userCode" placeholder="วางโค้ดของคุณที่นี่..."></textarea><br>
<button onclick="createZip()">สร้าง ZIP</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
function createZip() {
    const JSZipInstance = new JSZip();
    const userCode = document.getElementById("userCode").value;

    // ใส่ทุกอย่างลง index.html
    const indexHTML = `
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>หน้าเว็บของคุณ</title>
</head>
<body>
${userCode}
</body>
</html>
    `.trim();

    JSZipInstance.file("index.html", indexHTML);

    JSZipInstance.generateAsync({type:"blob"}).then(function(content) {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = "website.zip";
        link.click();
    });
}
</script>
</body>
</html>
